<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Conflict</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0d1117;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 👑 الشريط العلوي الثابت */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: #1a2332;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
            border-bottom: 1px solid #1f2937;
        }

        .game-title {
            font-size: 18px;
            font-weight: bold;
            color: #bdc3c7;
        }

        /* 🌍 محتوى اللعبة المتغير في المنتصف */
        .game-content {
            margin-top: 50px;
            margin-bottom: 60px;
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .loading-text {
            color: #66fcf1;
            font-size: 16px;
            text-align: center;
            margin-top: 50px;
        }

        /* 📦 ستايل البلوكات الرئيسية */
        .block-card {
            background-color: #1a2332;
            border: 1.5px solid #c5a059;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .side-img-box {
            width: 25%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .side-img-box img {
            max-width: 100%;
            max-height: 55px;
            object-fit: contain;
            border-radius: 4px;
        }

        .stats-grid {
            width: 75%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
            gap: 5px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .stat-label {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
        }

        /* 🔘 زر البرلمان */
        .parliament-btn {
            width: 100%;
            background-color: #26cbd4;
            border: 2px solid #0d1117;
            outline: none;
            color: #000000;
            font-size: 20px;
            font-weight: bold;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .parliament-btn:active {
            transform: scale(0.98);
        }

        /* 🚨 بلوك الأحداث الطارئة المخفي ذكياً */
        .events-block {
            background-color: #1f1616;
            border: 1.5px solid #ff4a4a;
            border-radius: 8px;
            padding: 10px;
            display: none; /* مخفي مبدئياً ويظهر بالجافاسكريبت */
            flex-direction: column;
            gap: 8px;
        }

        .event-btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            color: #ffffff;
        }

        .party-invite-btn { background-color: #cca43b; color: #000; }
        .war-alert-btn { background-color: #b71c1c; }

        /* 💬 بلوك غرفة الشات المتطور */
        .chat-block {
            background-color: #161b22;
            border: 1.5px solid #30363d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            height: 320px;
            overflow: hidden;
        }

        .chat-header {
            background-color: #21262d;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #30363d;
            text-align: center;
            color: #c9d1d9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-bubble {
            background-color: #21262d;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 90%;
            align-self: flex-start;
            border: 1px solid #30363d;
        }

        .msg-meta {
            font-size: 11px;
            color: #58a6ff;
            margin-bottom: 3px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .msg-text {
            font-size: 14px;
            color: #f0f6fc;
            word-break: break-word;
        }

        .chat-input-area {
            display: flex;
            padding: 8px;
            background-color: #0d1117;
            border-top: 1px solid #30363d;
            gap: 6px;
        }

        .chat-input {
            flex: 1;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 8px 14px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .chat-send-btn {
            background-color: #2188ff;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 📱 الجزء السفلي الثابت */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #1a2332;
            border-top: 1.5px solid #c5a059;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-link {
            background: none;
            border: none;
            color: #bdc3c7;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            flex: 1;
            text-align: center;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-link.active {
            color: #c5a059;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="game-title">Africa Conflict 🌍</div>
        <div id="player-status" style="font-size: 12px; color: #66fcf1;">جاري التحقق...</div>
    </div>

    <div class="game-content" id="scrollable-area">
        
        <div class="loading-text" id="loading-msg">جاري الاتصال بغرفة العمليات واستدعاء بيانات الدولة...</div>

        <div id="main-game-blocks" style="display: none; flex-direction: column; gap: 12px;">
            
            <div class="block-card">
                <div class="side-img-box">
                    <img src="https://img.icons8.com/ios-filled/100/ffffff/africa.png" id="continent-icon" alt="Africa">
                </div>
                <div class="stats-grid">
                    <div class="stat-item" onclick="alert('الانتقال لصفحة أحزاب القارة')">
                        <span class="stat-label">أحزاب</span>
                        <span class="stat-value" id="cont-parties">0</span>
                    </div>
                    <div class="stat-item" onclick="alert('الانتقال لصفحة الدول')">
                        <span class="stat-label">دول</span>
                        <span class="stat-value" id="cont-countries">50</span>
                    </div>
                    <div class="stat-item" onclick="alert('الانتقال لصفحة متصلي القارة')">
                        <span class="stat-label">متصل</span>
                        <span class="stat-value" id="cont-online">0</span>
                    </div>
                    <div class="stat-item" onclick="alert('الانتقال لإحصائيات سكان القارة')">
                        <span class="stat-label">سكان</span>
                        <span class="stat-value" id="cont-pop">0</span>
                    </div>
                </div>
            </div>

            <div class="block-card">
                <div class="side-img-box">
                    <img id="country-flag" src="https://flagcdn.com/w320/ma.png" alt="علم الدولة">
                </div>
                <div class="stats-grid">
                    <div class="stat-item" onclick="alert('الانتقال لمصانع الدولة')">
                        <span class="stat-label">مصانع</span>
                        <span class="stat-value" id="count-factories">0</span>
                    </div>
                    <div class="stat-item" onclick="alert('الانتقال لأحزاب الدولة')">
                        <span class="stat-label">أحزاب</span>
                        <span class="stat-value" id="count-parties">0</span>
                    </div>
                    <div class="stat-item" onclick="alert('الانتقال للمتصلين بالدولة')">
                        <span class="stat-label">متصل</span>
                        <span class="stat-value" id="count-online">0</span>
                    </div>
                    <div class="stat-item" onclick="alert('الانتقال لمعلومات الدولة')">
                        <span class="stat-label">الدولة</span>
                        <span class="stat-value" id="count-name">...</span>
                    </div>
                </div>
            </div>

            <button class="parliament-btn" onclick="alert('جاري الانتقال إلى قبة البرلمان ومجلس النواب...')">
                برلمان الدولة
            </button>

            <div class="events-block" id="game-events-box">
                <button class="event-btn party-invite-btn" id="btn-invite" style="display: none;" onclick="alert('فتح تفاصيل دعوة الحزب')">
                     لديك دعوة معلقة للانضمام إلى أحد الأحزاب!
                </button>
                <button class="event-btn war-alert-btn" id="btn-war" style="display: none;" onclick="alert('الذهاب لجبهة القتال الثائرة')">
                     حالة حرب مسلحة معلنة في الدولة الآن!
                </button>
            </div>

            <div class="chat-block">
                <div class="chat-header">غرفة الدردشة الإقليمية (المقالات والدردشات)</div>
                <div class="chat-messages" id="chat-messages-container">
                    </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-input-field" placeholder="اكتب رسالة برقية هنا...">
                    <button class="chat-send-btn" onclick="sendChatMessage()">◀</button>
                </div>
            </div>
            
        </div>

    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link" onclick="alert('صفحة الحساب قريباً')">الحساب</a>
        <a href="#" class="nav-link" onclick="alert('صفحة الحروب قريباً')">الحروب</a>
        <a href="#" class="nav-link" onclick="alert('صفحة العمل قريباً')">العمل</a>
        <a href="#" class="nav-link active">الرئيسية</a>
    </div>

    <script src="js/main_game.js"></script>
</body>
</html>
