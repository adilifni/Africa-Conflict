<body>

    <!-- الهيدر العلوي الثابت -->
    <header>
        <div class="user-welcome">القائد: <span id="user-name">جاري التحميل...</span></div>
        <div class="game-logo">
            <span>Africa Conflict</span>
            <span>🌍</span>
        </div>
    </header>

    <!-- الحاوية الوسطى المتحركة بانسيابية بين الهيدر والفوتر -->
    <main id="app-container">
        <!-- واجهة الرئيسية (Main View) -->
        <div id="view-main" class="game-view">
            <!-- إحصائيات القارة والدولة والشات (نفس محتويات الرئيسية المعتادة) -->
        </div>

        <!-- واجهة الحساب الشخصي (Profile View) - يتم جلبها أو تفويضها لهيكل الملفات -->
        <div id="view-profile" class="game-view" style="display: none; flex-direction: column; gap: 15px;">
            <!-- محتوى الحساب المنفصل (تأكد من وجوده أيضاً في pages/profile.html إذا كنت تحمله عبر Fetch أو وحدات JS) -->
        </div>

        <!-- واجهة العمل -->
        <div id="view-work" class="game-view" style="display: none;"></div>

        <!-- واجهة الحروب -->
        <div id="view-wars" class="game-view" style="display: none;"></div>
    </main>

    <!-- شريط التنقل السفلي الثابت بالترتيب الصحيح -->
<!-- شريط التنقل السفلي في main.html -->
<<nav class="bottom-nav" style="display: flex; justify-content: space-around; background: #1a1f26; padding: 10px; position: fixed; bottom: 0; width: 100%;">
    <button class="nav-link" onclick="switchView('profile')">الحساب</button>
    <button class="nav-link" onclick="switchView('wars')">الحروب</button>
    <button class="nav-link" onclick="switchView('work')">العمل</button>
    <button class="nav-link active" onclick="switchView('home')">الرئيسية</button>
</nav>

    <!-- دالة تغيير الاسم -->
    <script>
    function triggerNameChange() {
        const newName = prompt("أدخل اسم الشهرة الجديد الخاص بك:");
        if (newName && typeof changePlayerName === 'function') {
            changePlayerName(newName);
        }
    }
    </script>

    <!-- نظام الوحدات وجلب الصفحات المنفصلة -->
    <script type="module">
        import { initGameSystem } from './js/game.js';
        import { setupSliderSystem, setupChatSystem, setupInteractiveElements } from './app.js';

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                initGameSystem();
                setupSliderSystem();
                setupChatSystem();
                setupInteractiveElements();
            }, 1000);
        });
    </script>
</body>
