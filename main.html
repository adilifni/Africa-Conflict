<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صراع أفريقيا - قيادة الدولة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 👑 الجزء العلوي الثابت - شريط مؤشرات اللعبة العام */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #1f2833;
            border-bottom: 2px solid #c5a059;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .game-title {
            font-size: 16px;
            font-weight: bold;
            color: #c5a059;
        }

        /* 🌍 محتوى اللعبة المتغير في المنتصف - معلومات الدولة ومواردها */
        .game-content {
            margin-top: 60px;
            margin-bottom: 70px;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .country-card {
            background-color: #1f2833;
            border: 1px solid #c5a059;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .country-name {
            font-size: 24px;
            color: #66fcf1;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .resource-box {
            background-color: #0b0c10;
            border: 1px solid #45f3ff33;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .resource-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .resource-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
        }

        /* 📱 الجزء السفلي الثابت - أزرار القوائم للتنقل */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: #1f2833;
            border-top: 2px solid #c5a059;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #c5a25d;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-btn.active {
            color: #66fcf1;
        }

        .loading-text {
            color: #66fcf1;
            font-size: 16px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="game-title">صراع أفريقيا 🌍</div>
        <div id="player-status" style="font-size: 12px; color: #66fcf1;">جاري التحقق...</div>
    </div>

    <div class="game-content" id="main-content-area">
        <div class="loading-text" id="loading-msg">جاري الاتصال بغرفة العمليات واستدعاء بيانات الدولة...</div>
        
        <div class="country-card" id="country-data-card" style="display: none;">
            <div class="country-name" id="country-title">اسم الدولة</div>
            <p style="color: #aaa; font-size: 14px;">مخزون وموارد الدولة الحالية</p>
            
            <div class="resources-grid">
                <div class="resource-box">
                    <span class="resource-label">الذهب</span>
                    <span class="resource-value" id="country-gold">0</span>
                </div>
                <div class="resource-box">
                    <span class="resource-label">النفط</span>
                    <span class="resource-value" id="country-oil">0</span>
                </div>
                <div class="resource-box">
                    <span class="resource-label">القمح</span>
                    <span class="resource-value" id="country-wheat">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active">الدولة</button>
        <button class="nav-btn">الجيش</button>
        <button class="nav-btn">المصانع</button>
        <button class="nav-btn">السوق</button>
        <button class="nav-btn">التحالفات</button>
    </div>

    <script src="js/main_game.js"></script>
</body>
</html>
