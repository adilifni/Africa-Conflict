<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Conflict - صراع أفريقيا</title>
    <!-- ربط ملف التنسيقات الخارجي -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- حاوية صفحة تسجيل الدخول الرئيسية -->
    <div class="login-container">
        
        <!-- قسم الأيقونة والشعار (صورة PNG كما طلبت بالتطابق مع IMG_20260626_003016.jpg) -->
        <div class="logo-wrapper">
            <img src="assets/logo.png" alt="Africa Conflict Logo" class="game-logo">
        </div>

        <!-- زر تسجيل الدخول بجوجل (مطابق تماماً للتصميم السفلي في صورتك) -->
        <button class="google-login-btn" id="google-login-trigger">
            <div class="google-icon-wrapper">
                <!-- شعار جوجل الرسمي الملون -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="32px" height="32px">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.5 24c0-1.55-.15-3.24-.47-4.77H24v9.03h12.75c-.55 2.87-2.22 5.37-4.72 7.04l7.32 5.68C43.59 36.46 46.5 30.76 46.5 24z"/>
                    <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.32-5.68c-2.11 1.42-4.81 2.3-8.57 2.3-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </</svg>
            </div>
            <div class="button-text-wrapper">
                <span class="text-en">Sign in with Google</span>
                <span class="text-ar">تسجيل الدخول باستخدام جوجل</span>
            </div>
        </button>

    </div>

    <!-- ربط ملف الجافاسكريبت المسؤول عن البرمجة والـ Firebase لاحقاً -->

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

        <script src="js/auth.js"></script>
        <script src="js/app.js"></script>
</body>
</html>
