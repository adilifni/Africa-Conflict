<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Africa Conflict</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0d1117;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 👑 الشريط العلوي الثابت */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: #1a2332;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
            border-bottom: 1px solid #1f2937;
        }

        .game-title {
            font-size: 18px;
            font-weight: bold;
            color: #bdc3c7;
        }

        /* 🌍 محتوى اللعبة المتغير في المنتصف */
        .game-content {
            margin-top: 60px;
            margin-bottom: 80px;
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .loading-text {
            color: #66fcf1;
            font-size: 16px;
            text-align: center;
            margin-top: 50px;
        }

        /* 📦 ستايل البلوكات الرئيسية */
        .block-card {
            background-color: #1a2332;
            border: 1.5px solid #c5a059;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .side-img-box {
            width: 25%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background-color: #1a2332;
        }

        .clickable-asset {
            max-width: 100%;
            max-height: 55px;
            object-fit: contain;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }
        
        .clickable-asset:active {
            transform: scale(0.92);
        }

        /* 🛝 هيكلية السلايدر الخاص ببلوك القارة */
        .slider-wrapper {
            width: 75%;
            overflow: hidden;
            position: relative;
        }

        .slider-container {
            display: flex;
            transition: transform 0.4s ease-in-out;
            width: 200%; /* صفحتين */
        }

        .slider-page {
            width: 50%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
            gap: 5px;
            flex-shrink: 0;
        }

        /* نقاط التحكم بالسلايدر السفلي */
        .slider-dots {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #57606a;
            border-radius: 50%;
            transition: background-color 0.3s;
            cursor: pointer;
        }

        .dot.active {
            background-color: #c5a059;
        }

        /* الشبكة العادية للبلوك الثاني */
        .stats-grid {
            width: 75%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
            gap: 5px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .stat-label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        /* 🔘 زر البرلمان */
        .parliament-btn {
            width: 100%;
            background-color: #26cbd4;
            border: 2px solid #0d1117;
            color: #000000;
            font-size: 20px;
            font-weight: bold;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 💬 غرفة الشات */
        .chat-block {
            background-color: #161b22;
            border: 1.5px solid #30363d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            height: 320px;
            overflow: hidden;
        }

        .chat-header {
            background-color: #21262d;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #30363d;
            text-align: center;
            color: #c9d1d9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-bubble {
            background-color: #21262d;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 90%;
            align-self: flex-start;
            border: 1px solid #30363d;
            word-break: break-word;
        }

        .msg-meta {
            font-size: 11px;
            color: #58a6ff;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .msg-text {
            font-size: 14px;
            color: #f0f6fc;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #0d1117;
            border-top: 1px solid #30363d;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 10px 14px;
            color: #ffffff;
            outline: none;
        }

        .chat-send-btn {
            background-color: #2188ff;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }
         
        .chat-send-btn:active {
            transform: scale(0.9);
        }

        /* 📱 الفوتر الثابت */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #1a2332;
            border-top: 1.5px solid #c5a059;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-link {
            color: #bdc3c7;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            flex: 1;
            text-align: center;
        }

        .nav-link.active {
            color: #c5a059;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="game-title">Africa Conflict 🌍</div>
        <div id="player-status" style="font-size: 12px; color: #66fcf1;">جاري التحقق...</div>
    </div>

    <div class="game-content">
        <div class="loading-text" id="loading-msg">جاري الاتصال واستدعاء البيانات الحية...</div>

        <div id="main-game-blocks" style="display: none; flex-direction: column; gap: 12px;">
            
            <div class="block-card" id="continent-card" onclick="toggleContinentSlider()">
                <div class="side-img-box">
                    <img src="https://img.icons8.com/ios-filled/100/ffffff/africa.png" class="clickable-asset" id="continent-map-btn" alt="Africa">
                </div>
                
                <div class="slider-wrapper" id="slider-wrapper-zone">
                    <div class="slider-container" id="slider-core">
                        <div class="slider-page">
                            <div class="stat-item">
                                <span class="stat-label">أحزاب</span>
                                <span class="stat-value" id="cont-parties">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">دول</span>
                                <span class="stat-value" id="cont-countries">50</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">متصل</span>
                                <span class="stat-value" id="cont-online">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">سكان</span>
                                <span class="stat-value" id="cont-pop">0</span>
                            </div>
                        </div>
                        <div class="slider-page">
                            <div class="stat-item">
                                <span class="stat-label">مصانع</span>
                                <span class="stat-value" id="cont-factories">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">مستقل</span>
                                <span class="stat-value" id="cont-independent">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">التحالف</span>
                                <span class="stat-value" id="cont-alliances">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">-</span>
                                <span class="stat-value">-</span>
                            </div>
                        </div>
                    </div>
                    <div class="slider-dots">
                        <div class="dot active" id="dot0"></div>
                        <div class="dot" id="dot1"></div>
                    </div>
                </div>
            </div>

            <div class="block-card">
                <div class="side-img-box">
                    <img id="country-flag" src="https://flagcdn.com/w320/ma.png" class="clickable-asset" alt="علم الدولة">
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">مصانع</span>
                        <span class="stat-value" id="count-factories">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">أحزاب</span>
                        <span class="stat-value" id="count-parties">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">متصل</span>
                        <span class="stat-value" id="count-online">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">سكان</span>
                        <span class="stat-value" id="count-pop">0</span>
                    </div>
                </div>
            </div>

            <button class="parliament-btn" onclick="alert('الانتقال للبرلمان قريباً')">برلمان الدولة</button>

            <div class="chat-block">
                <div class="chat-header"> غرفة الدردشة</div>
                <div class="chat-messages" id="chat-messages-container"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-input-field" placeholder="اكتب رسالة برقية هنا...">
                    <button class="chat-send-btn" id="send-chat-trigger">◀</button>
                </div>
            </div>
            
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link">الحساب</a>
        <a href="#" class="nav-link">الحروب</a>
        <a href="#" class="nav-link">العمل</a>
        <a href="#" class="nav-link active">الرئيسية</a>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main_game.js"></script>

    <script>
        // دالة سريعة للتحكم بنقر السلايدر الخاص بالقارة
        let currentSliderPage = 0;
        function toggleContinentSlider() {
            const core = document.getElementById('slider-core');
            const dot0 = document.getElementById('dot0');
            const dot1 = document.getElementById('dot1');
            if (currentSliderPage === 0) {
                core.style.transform = 'translateX(50%)'; // لأن الاتجاه RTL يمين ليسار
                dot0.classList.remove('active');
                dot1.classList.add('active');
                currentSliderPage = 1;
            } else {
                core.style.transform = 'translateX(0)';
                dot1.classList.remove('active');
                dot0.classList.add('active');
                currentSliderPage = 0;
            }
        }
    </script>
</body>
</html>
